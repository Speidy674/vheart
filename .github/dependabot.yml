version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    groups:
      laravel:
        patterns:
          - "laravel/framework"
          - "laravel/octane"
          - "laravel/tinker"
          - "laravel/pail"
          - "laravel/sail"
          - "illuminate/*"
          - "symfony/*"
      filament:
        patterns:
          - "filament/*"
          - "danharrin/*"
      pest:
        patterns:
          - "pestphp/*"
          - "mockery/mockery"
          - "nunomaduro/collision"
      code-quality:
        patterns:
          - "larastan/*"
          - "phpstan/*"
          - "rector/*"
          - "laravel/pint"
    ignore:
      - dependency-name: "laravel/framework"
        update-types: ["version-update:semver-major"]
      - dependency-name: "php"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "@vitejs/plugin-react"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "postcss"
          - "autoprefixer"
          - "tailwind-merge"
          - "clsx"
      vite:
        patterns:
          - "vite"
          - "laravel-vite-plugin"
          - "@laravel/vite-plugin-wayfinder"
      i18n:
        patterns:
          - "i18next"
          - "react-i18next"
          - "i18next-*"
      linting:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "prettier"
          - "prettier-*"
          - "typescript-eslint"
